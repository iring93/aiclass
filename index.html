<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【台大食堂】線上預約點餐單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Noto Serif TC"', 'serif'],
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    colors: {
                        'classic-bg': '#F9F8F6',
                        'classic-paper': '#FFFFFF',
                        'classic-text': '#3E3A39',
                        // 替換為台大經典磚紅色調
                        'classic-accent': '#8C3B3B', 
                        'classic-border': '#D5CABD',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: theme('colors.classic-bg');
            color: theme('colors.classic-text');
        }
        input[type="radio"], input[type="checkbox"] {
            accent-color: theme('colors.classic-accent');
            width: 1.1rem;
            height: 1.1rem;
        }
        .elegant-input, .elegant-select {
            border: none;
            border-bottom: 1px solid theme('colors.classic-border');
            background-color: transparent;
            border-radius: 0;
            padding: 0.5rem 0;
            transition: all 0.3s ease;
            width: 100%;
        }
        .elegant-input:focus, .elegant-select:focus {
            outline: none;
            border-bottom: 2px solid theme('colors.classic-accent');
            box-shadow: none;
        }
        .decorative-line {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2rem 0;
        }
        .decorative-line::before, .decorative-line::after {
            content: '';
            height: 1px;
            width: 60px;
            background-color: theme('colors.classic-border');
        }
        .decorative-line span {
            margin: 0 1rem;
            color: theme('colors.classic-accent');
            font-size: 0.8rem;
        }
        /* 餐點價格標籤樣式 */
        .price-tag {
            font-family: 'Noto Serif TC', serif;
            color: theme('colors.classic-accent');
            font-weight: 600;
            margin-left: auto;
        }
        .menu-item {
            display: flex;
            align-items: center;
            padding: 0.75rem;
            border: 1px solid transparent;
            transition: background-color 0.2s;
        }
        .menu-item:hover {
            background-color: theme('colors.classic-bg');
        }
    </style>
</head>
<body class="font-sans antialiased py-10 px-4 sm:px-6 lg:px-8">

    <main class="max-w-3xl mx-auto bg-classic-paper p-8 sm:p-12 shadow-sm border border-classic-border relative mb-24">
        
        <!-- 四角裝飾 -->
        <div class="absolute top-0 left-0 w-8 h-8 border-t border-l border-classic-accent opacity-50 m-2"></div>
        <div class="absolute top-0 right-0 w-8 h-8 border-t border-r border-classic-accent opacity-50 m-2"></div>
        <div class="absolute bottom-0 left-0 w-8 h-8 border-b border-l border-classic-accent opacity-50 m-2"></div>
        <div class="absolute bottom-0 right-0 w-8 h-8 border-b border-r border-classic-accent opacity-50 m-2"></div>

        <!-- Header -->
        <header class="text-center mb-10">
            <p class="font-serif text-classic-accent tracking-widest text-sm mb-2">National Taiwan University</p>
            <h1 class="font-serif text-3xl sm:text-4xl font-semibold leading-snug text-classic-text tracking-wide">
                台大食堂線上預約點餐單
            </h1>
            <div class="decorative-line">
                <span>✦</span>
            </div>
        </header>

        <!-- 一、訂餐資訊 -->
        <section class="mb-10">
            <h2 class="font-serif text-xl font-semibold border-b border-classic-border pb-2 mb-6 text-classic-accent">一、 營業與取餐資訊</h2>
            <div class="space-y-4 text-sm sm:text-base leading-relaxed pl-2 sm:pl-4">
                <div class="flex flex-col sm:flex-row">
                    <span class="font-semibold w-24 shrink-0 text-classic-text">供餐時間：</span>
                    <p class="text-gray-600">午餐 11:30 - 13:30 ｜ 晚餐 17:00 - 19:00</p>
                </div>
                <div class="flex flex-col sm:flex-row">
                    <span class="font-semibold w-24 shrink-0 text-classic-text">取餐地點：</span>
                    <p class="text-gray-600">第一學生活動中心 (活大) 1F 專屬取餐口</p>
                </div>
                <div class="flex flex-col sm:flex-row">
                    <span class="font-semibold w-24 shrink-0 text-classic-text">注意事項：</span>
                    <p class="text-gray-600">為確保餐點品質，請於取餐時間 <span class="text-classic-accent font-semibold">前 30 分鐘</span> 完成線上點餐。現場結帳僅提供悠遊卡或 Line Pay 支付。</p>
                </div>
            </div>
        </section>

        <form id="orderForm" onsubmit="handleSubmit(event)">
            
            <!-- 二、訂餐人資料 -->
            <section class="mb-12">
                <h2 class="font-serif text-xl font-semibold border-b border-classic-border pb-2 mb-6 text-classic-accent">二、 訂餐人資料</h2>
                <div class="space-y-6 pl-2 sm:pl-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="flex flex-col">
                            <label for="name" class="font-semibold mb-1">姓名 <span class="text-red-500">*</span></label>
                            <input type="text" id="name" required class="elegant-input" placeholder="請輸入姓名">
                        </div>
                        <div class="flex flex-col">
                            <label for="studentId" class="font-semibold mb-1">學號 / 教職員工號 <span class="text-red-500">*</span></label>
                            <input type="text" id="studentId" required class="elegant-input" placeholder="例如：B11901000">
                        </div>
                        <div class="flex flex-col">
                            <label for="phone" class="font-semibold mb-1">聯絡電話 <span class="text-red-500">*</span></label>
                            <input type="tel" id="phone" required class="elegant-input" placeholder="09XX-XXX-XXX">
                        </div>
                        <div class="flex flex-col">
                            <label for="pickupTime" class="font-semibold mb-1">預計取餐時間 <span class="text-red-500">*</span></label>
                            <select id="pickupTime" required class="elegant-select text-gray-700 cursor-pointer">
                                <option value="" disabled selected>請選擇時間</option>
                                <optgroup label="午餐時段">
                                    <option value="11:30">11:30</option>
                                    <option value="12:00">12:00</option>
                                    <option value="12:30">12:30</option>
                                    <option value="13:00">13:00</option>
                                </optgroup>
                                <optgroup label="晚餐時段">
                                    <option value="17:00">17:00</option>
                                    <option value="17:30">17:30</option>
                                    <option value="18:00">18:00</option>
                                    <option value="18:30">18:30</option>
                                </optgroup>
                            </select>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 三、餐點選擇 -->
            <section class="mb-12">
                <h2 class="font-serif text-xl font-semibold border-b border-classic-border pb-2 mb-6 text-classic-accent">三、 本日菜單選擇</h2>
                <div class="space-y-8 pl-2 sm:pl-4">
                    
                    <!-- 類別：主餐 -->
                    <fieldset>
                        <legend class="font-semibold mb-3 text-lg flex items-center">
                            <span class="w-1.5 h-4 bg-classic-accent mr-2 block"></span> 經典主餐 (請擇一) <span class="text-red-500 ml-1">*</span>
                        </legend>
                        <div class="flex flex-col border border-classic-border divide-y divide-classic-border">
                            <label class="menu-item cursor-pointer">
                                <input type="radio" name="mainMeal" value="椰林古早味排骨飯" data-price="100" class="mr-4" required>
                                <span>椰林古早味排骨飯</span>
                                <span class="price-tag">$100</span>
                            </label>
                            <label class="menu-item cursor-pointer">
                                <input type="radio" name="mainMeal" value="傅鐘秘製滷雞腿飯" data-price="110" class="mr-4">
                                <span>傅鐘秘製滷雞腿飯</span>
                                <span class="price-tag">$110</span>
                            </label>
                            <label class="menu-item cursor-pointer">
                                <input type="radio" name="mainMeal" value="醉月蔥爆牛肉餐" data-price="120" class="mr-4">
                                <span>醉月蔥爆牛肉餐</span>
                                <span class="price-tag">$120</span>
                            </label>
                            <label class="menu-item cursor-pointer">
                                <input type="radio" name="mainMeal" value="小福健康鮮蔬餐(素)" data-price="90" class="mr-4">
                                <span>小福健康鮮蔬餐 <span class="text-xs text-green-600 bg-green-100 px-1 py-0.5 rounded ml-1">素食</span></span>
                                <span class="price-tag">$90</span>
                            </label>
                        </div>
                    </fieldset>

                    <!-- 類別：單點與湯飲 -->
                    <fieldset>
                        <legend class="font-semibold mb-3 text-lg flex items-center">
                            <span class="w-1.5 h-4 bg-classic-border mr-2 block"></span> 單點與飲品 (可複選)
                        </legend>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-0 border border-classic-border bg-white">
                            <label class="menu-item cursor-pointer border-b sm:border-r border-classic-border">
                                <input type="checkbox" name="addons" value="現滷入味滷蛋" data-price="15" class="mr-4">
                                <span>現滷入味滷蛋</span>
                                <span class="price-tag">$15</span>
                            </label>
                            <label class="menu-item cursor-pointer border-b border-classic-border">
                                <input type="checkbox" name="addons" value="季節燙青菜" data-price="30" class="mr-4">
                                <span>季節燙青菜</span>
                                <span class="price-tag">$30</span>
                            </label>
                            <label class="menu-item cursor-pointer border-b sm:border-b-0 sm:border-r border-classic-border">
                                <input type="checkbox" name="addons" value="農學院特製鮮奶" data-price="40" class="mr-4">
                                <span>農學院特製鮮奶</span>
                                <span class="price-tag">$40</span>
                            </label>
                            <label class="menu-item cursor-pointer">
                                <input type="checkbox" name="addons" value="無糖沁涼冷泡茶" data-price="25" class="mr-4">
                                <span>無糖沁涼冷泡茶</span>
                                <span class="price-tag">$25</span>
                            </label>
                        </div>
                    </fieldset>

                    <!-- 備註 -->
                    <fieldset>
                        <label for="notes" class="font-semibold mb-3 block text-base flex items-center">
                            <span class="w-1.5 h-4 bg-classic-border mr-2 block"></span> 客製化備註
                        </label>
                        <textarea id="notes" rows="2" class="w-full border border-classic-border p-3 rounded-none focus:outline-none focus:border-classic-accent focus:ring-1 focus:ring-classic-accent transition-colors bg-transparent resize-none" placeholder="例如：飯少、不加香菜、青菜多一點..."></textarea>
                    </fieldset>
                </div>
            </section>

            <!-- 底部浮動：總計與送出 -->
            <div class="fixed bottom-0 left-0 w-full bg-classic-paper border-t border-classic-border shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] p-4 sm:p-6 z-40 flex justify-between items-center px-4 sm:px-12 md:px-24">
                <div class="flex flex-col">
                    <span class="text-gray-500 text-sm font-serif">訂單總金額</span>
                    <div class="text-2xl sm:text-3xl font-serif font-bold text-classic-accent tracking-wide">
                        NT$ <span id="totalPriceDisplay">0</span>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="bg-classic-text text-white font-serif px-6 sm:px-10 py-3 tracking-widest hover:bg-classic-accent transition-colors duration-300 shadow-md whitespace-nowrap">
                    確認點餐
                </button>
            </div>

        </form>
    </main>

    <!-- 成功提示視窗 -->
    <div id="successModal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center z-50 transition-opacity">
        <div class="bg-classic-paper p-8 max-w-sm mx-auto border border-classic-border text-center shadow-lg relative">
            <h3 class="font-serif text-2xl text-classic-accent mb-4">點餐成功</h3>
            <p class="text-classic-text mb-6">我們已收到您的訂單！請記得於指定時間前往取餐，並於現場完成結帳。祝您用餐愉快！</p>
            <button onclick="closeModal()" class="border border-classic-text px-8 py-2 hover:bg-classic-text hover:text-white transition-colors">確認</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🌟 您的 Google Apps Script 網址
        // ==========================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzL4u6QiruERmfh-7_8bo8VjoSqTnmM0kY84TA_jZxBJLS8G2VgwlevhwHFxMrFzVsJ/exec';

        // 即時計算總金額邏輯
        function calculateTotal() {
            let total = 0;
            
            // 抓取主餐金額
            const mainMeal = document.querySelector('input[name="mainMeal"]:checked');
            if(mainMeal) total += parseInt(mainMeal.dataset.price);

            // 抓取單點/飲品金額
            const addons = document.querySelectorAll('input[name="addons"]:checked');
            addons.forEach(addon => {
                total += parseInt(addon.dataset.price);
            });

            // 更新顯示
            document.getElementById('totalPriceDisplay').innerText = total;
            return total;
        }

        // 綁定所有帶有 data-price 屬性的 input 的 change 事件
        document.querySelectorAll('input[data-price]').forEach(input => {
            input.addEventListener('change', calculateTotal);
        });

        // 處理表單送出與 API 串接邏輯
        function handleSubmit(event) {
            event.preventDefault(); 

            // 計算最終總價確保無誤
            const finalPrice = calculateTotal();
            if(finalPrice === 0) {
                alert("請至少選擇一項主餐喔！");
                return;
            }

            // 讓按鈕顯示載入中
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerText;
            submitBtn.innerText = '訂單傳送中...';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

            // 收集資料
            const name = document.getElementById('name').value;
            const studentId = document.getElementById('studentId').value;
            const phone = document.getElementById('phone').value;
            const pickupTime = document.getElementById('pickupTime').value;
            const mainMeal = document.querySelector('input[name="mainMeal"]:checked')?.value || '';
            const notes = document.getElementById('notes').value;

            // 處理複選題 (將陣列轉為用逗號分隔的字串)
            const addons = Array.from(document.querySelectorAll('input[name="addons"]:checked')).map(cb => cb.value).join(', ');

            // 建立 FormData
            const formData = new FormData();
            formData.append('name', name);
            formData.append('studentId', studentId);
            formData.append('phone', phone);
            formData.append('pickupTime', pickupTime);
            formData.append('mainMeal', mainMeal);
            formData.append('addons', addons);
            formData.append('totalPrice', finalPrice.toString());
            formData.append('notes', notes);

            // 透過 fetch API 送出資料
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData
            })
            .then(response => {
                // 顯示成功對話框
                const modal = document.getElementById('successModal');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                
                // 清空表單與總金額
                document.getElementById('orderForm').reset();
                calculateTotal();
            })
            .catch(error => {
                alert('網路連線異常，但訂單通常仍會成功送出，請向餐廳人員確認。');
                console.error('Error!', error.message);
            })
            .finally(() => {
                // 恢復按鈕原本的狀態
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            });
        }

        // 關閉成功提示視窗並回到頂部
        function closeModal() {
            const modal = document.getElementById('successModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
